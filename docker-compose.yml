services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./dovale-price-spark
      args:
        # Em produção, use a URL pública do backend (ex: https://api.seudominio.com)
        VITE_API_URL: http://localhost:3001
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
